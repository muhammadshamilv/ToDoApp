{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Todo App</title>
    <link rel="stylesheet" href="{% static 'todo/css/style.css' %}">
</head>
<body>

<h1>📝 Todo App</h1>

<form method="POST">
    {% csrf_token %}
    <input type="text" name="title" placeholder="Enter task">
    <button type="submit">Add</button>
</form>

<ul>
    {% for task in tasks %}
        <li>
            {{ task.title }} - {{ task.completed }}
        </li>
    {% endfor %}
</ul>

<script src="{% static 'todo/js/script.js' %}"></script>

</body>
</html>
